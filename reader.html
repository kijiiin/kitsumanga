<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Lettore Manga</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: white;
      overflow: hidden;
      height: 100vh;
    }
    
    .top-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      padding: 0.8rem 1.5rem;
      background: rgba(10, 10, 20, 0.95);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      gap: 1rem;
      z-index: 1000;
      border-bottom: 1px solid rgba(139, 92, 246, 0.3);
      flex-wrap: wrap;
      transition: transform 0.3s ease;
    }
    .top-bar.hide { transform: translateY(-100%); }
    .back-btn {
      background: rgba(139, 92, 246, 0.3);
      color: white;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.9rem;
      text-decoration: none;
    }
    .manga-title {
      font-size: 1.1rem;
      font-weight: 600;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .selector-container { display: flex; align-items: center; gap: 0.5rem; }
    .selector-label { color: #c4b5fd; font-size: 0.9rem; }
    .chapter-select {
      padding: 0.5rem 1rem;
      background: #1a1a2e;
      color: white;
      border: 1px solid #6b21a8;
      border-radius: 8px;
      font-size: 0.9rem;
      cursor: pointer;
      min-width: 150px;
    }
    .type-badge {
      background: rgba(107, 33, 168, 0.3);
      padding: 0.3rem 0.8rem;
      border-radius: 20px;
      font-size: 0.8rem;
      color: #c4b5fd;
    }
    
    .reader-container {
      height: 100vh;
      width: 100%;
      overflow-x: auto;
      overflow-y: hidden;
      scroll-snap-type: x mandatory;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .reader-container::-webkit-scrollbar { display: none; }
    
    .reader-wrapper {
      display: flex;
      flex-direction: row;
      height: 100%;
      align-items: center;
    }
    .page {
      flex: 0 0 100%;
      height: 100vh;
      scroll-snap-align: start;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #000;
      position: relative;
    }
    .page img {
      max-height: 100vh;
      max-width: 100%;
      width: auto;
      height: auto;
      object-fit: contain;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.2s ease;
    }
    .page img.loaded {
      opacity: 1;
    }
    
    .bottom-controls {
      position: fixed;
      bottom: 50%;
      transform: translateY(50%);
      right: 1rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      background: rgba(10, 10, 20, 0.85);
      padding: 0.8rem;
      border-radius: 40px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(139, 92, 246, 0.3);
      z-index: 1000;
      transition: opacity 0.3s ease, transform 0.3s ease;
    }
    .bottom-controls.hide {
      opacity: 0;
      transform: translateY(50%) translateX(100%);
      pointer-events: none;
    }
    .nav-btn {
      background: #6b21a8;
      color: white;
      border: none;
      padding: 0.8rem 1rem;
      border-radius: 30px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      transition: 0.2s;
      min-width: 70px;
    }
    .nav-btn:hover { background: #8b5cf6; transform: scale(1.05); }
    .page-indicator {
      text-align: center;
      padding: 0.5rem;
      font-size: 0.9rem;
      color: #c4b5fd;
      font-weight: 600;
      background: rgba(0,0,0,0.5);
      border-radius: 20px;
    }
    
    .initial-loading, .error, .empty {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      padding: 2rem;
      background: rgba(0,0,0,0.8);
      border-radius: 20px;
      z-index: 2000;
    }
    .initial-loading { color: #c4b5fd; }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #8b5cf6;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .toast {
      position: fixed;
      bottom: 30%;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(139, 92, 246, 0.9);
      color: white;
      padding: 12px 24px;
      border-radius: 40px;
      font-size: 0.9rem;
      font-weight: 600;
      z-index: 2000;
      animation: toastFade 2s ease forwards;
      pointer-events: none;
    }
    @keyframes toastFade {
      0% { opacity: 0; transform: translateX(-50%) translateY(20px); }
      15% { opacity: 1; transform: translateX(-50%) translateY(0); }
      85% { opacity: 1; }
      100% { opacity: 0; transform: translateX(-50%) translateY(-20px); visibility: hidden; }
    }
    
    @media (max-width: 768px) {
      .top-bar { padding: 0.6rem 1rem; }
      .selector-container { width: 100%; margin-top: 0.3rem; }
      .chapter-select { flex: 1; }
      .bottom-controls { right: 0.5rem; padding: 0.6rem; gap: 0.8rem; }
      .nav-btn { padding: 0.6rem 0.8rem; min-width: 60px; font-size: 0.75rem; }
      .page-indicator { font-size: 0.75rem; }
    }
  </style>
</head>
<body>

<div class="top-bar" id="topBar">
  <a href="javascript:history.back()" class="back-btn">← Libreria</a>
  <span class="manga-title" id="mangaTitle">Caricamento...</span>
  <span class="type-badge" id="typeBadge"></span>
  <div class="selector-container">
    <span class="selector-label" id="selectorLabel">Seleziona:</span>
    <select class="chapter-select" id="chapterSelect" disabled>
      <option>Caricamento...</option>
    </select>
  </div>
</div>

<div class="reader-container" id="readerContainer">
  <div class="reader-wrapper" id="readerWrapper"></div>
</div>

<div class="bottom-controls" id="bottomControls">
  <button class="nav-btn" id="prevBtn">◀ PREV</button>
  <span class="page-indicator" id="pageIndicator">0 / 0</span>
  <button class="nav-btn" id="nextBtn">NEXT ▶</button>
</div>

<script>
  const urlParams = new URLSearchParams(window.location.search);
  const mangaId = urlParams.get('manga');
  const mangaTitle = decodeURIComponent(urlParams.get('title') || 'Manga');
  const preloadNumber = urlParams.get('number');
  const preloadType = urlParams.get('type');
  
  document.getElementById('mangaTitle').textContent = mangaTitle;
  document.title = `${mangaTitle} - KitsuManga`;

  let contentType = preloadType || null;
  let currentNumber = preloadNumber ? parseInt(preloadNumber) : 1;
  let totalPages = 0;
  let allNumbers = [];
  let currentPageIndex = 0;
  let isLoadingChapter = false;
  let detectionComplete = false; // Per sapere se abbiamo già trovato l'ultima pagina

  const topBar = document.getElementById('topBar');
  const bottomControls = document.getElementById('bottomControls');
  const readerContainer = document.getElementById('readerContainer');
  const readerWrapper = document.getElementById('readerWrapper');
  const chapterSelect = document.getElementById('chapterSelect');
  const typeBadge = document.getElementById('typeBadge');
  const selectorLabel = document.getElementById('selectorLabel');
  const pageIndicator = document.getElementById('pageIndicator');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');

  function showToast(message) {
    const existingToast = document.querySelector('.toast');
    if (existingToast) existingToast.remove();
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.textContent = message;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2000);
  }

  let hideTimeout;
  function resetHideTimer() {
    clearTimeout(hideTimeout);
    topBar.classList.remove('hide');
    bottomControls.classList.remove('hide');
    hideTimeout = setTimeout(() => {
      topBar.classList.add('hide');
      bottomControls.classList.add('hide');
    }, 2500);
  }
  
  function showUI() {
    topBar.classList.remove('hide');
    bottomControls.classList.remove('hide');
    resetHideTimer();
  }
  
  document.addEventListener('mousemove', showUI);
  document.addEventListener('click', showUI);
  document.addEventListener('touchstart', showUI);
  resetHideTimer();

  async function loadManifest() {
    try {
      const res = await fetch(`manga/${mangaId}/manifest.json?t=${Date.now()}`);
      if (res.ok) {
        const manifest = await res.json();
        contentType = manifest.type;
        allNumbers = manifest.numbers;
        
        if (contentType === 'volumes') {
          typeBadge.textContent = '📚 VOLUMI';
          selectorLabel.textContent = 'Volume:';
        } else {
          typeBadge.textContent = '📖 CAPITOLI';
          selectorLabel.textContent = 'Capitolo:';
        }
        
        const label = contentType === 'volumes' ? 'Volume' : 'Capitolo';
        chapterSelect.innerHTML = allNumbers.map(n => `<option value="${n}" ${n == currentNumber ? 'selected' : ''}>${label} ${n}</option>`).join('');
        chapterSelect.disabled = false;
        
        chapterSelect.onchange = async (e) => {
          if (isLoadingChapter) return;
          currentNumber = parseInt(e.target.value);
          await loadChapter();
        };
        return true;
      }
    } catch(e) {}
    return false;
  }

  async function changeChapter(newNumber) {
    if (isLoadingChapter || !allNumbers.includes(newNumber)) return false;
    isLoadingChapter = true;
    currentNumber = newNumber;
    chapterSelect.value = currentNumber;
    await loadChapter();
    isLoadingChapter = false;
    return true;
  }

  async function nextChapter() {
    const idx = allNumbers.indexOf(currentNumber);
    if (idx < allNumbers.length - 1) {
      const nextNum = allNumbers[idx + 1];
      showToast(`${contentType === 'volumes' ? 'Volume' : 'Capitolo'} ${nextNum}`);
      await changeChapter(nextNum);
    } else {
      showToast(`🏁 Ultimo ${contentType === 'volumes' ? 'volume' : 'capitolo'}`);
    }
  }

  async function prevChapter() {
    const idx = allNumbers.indexOf(currentNumber);
    if (idx > 0) {
      const prevNum = allNumbers[idx - 1];
      showToast(`${contentType === 'volumes' ? 'Volume' : 'Capitolo'} ${prevNum}`);
      await changeChapter(prevNum);
    } else {
      showToast(`🏁 Primo ${contentType === 'volumes' ? 'volume' : 'capitolo'}`);
    }
  }

  // Trova l'ultima pagina esistente con una richiesta HEAD ottimizzata
  async function findLastPage(basePath, startGuess = 100) {
    // Prima prova a trovare un range
    let low = 1;
    let high = startGuess;
    
    // Espandi l'intervallo finché non troviamo un 404
    let found = true;
    while (found) {
      const testUrl = `${basePath}${high}.jpg`;
      try {
        const res = await fetch(testUrl, { method: 'HEAD' });
        if (res.ok) {
          low = high;
          high = high * 2;
          if (high > 2000) break; // Limite massimo
        } else {
          found = false;
        }
      } catch(e) {
        found = false;
      }
    }
    
    // Ora facciamo una ricerca binaria tra low e high
    let lastValid = low;
    while (low <= high) {
      const mid = Math.floor((low + high) / 2);
      const testUrl = `${basePath}${mid}.jpg`;
      try {
        const res = await fetch(testUrl, { method: 'HEAD' });
        if (res.ok) {
          lastValid = mid;
          low = mid + 1;
        } else {
          high = mid - 1;
        }
      } catch(e) {
        high = mid - 1;
      }
    }
    
    return lastValid;
  }

  async function loadChapter() {
    detectionComplete = false;
    
    // Mostra loading solo al primo caricamento
    if (!totalPages) {
      readerWrapper.innerHTML = '<div class="initial-loading"><div class="spinner"></div><div>Rilevamento pagine...</div></div>';
    }
    
    const basePath = `manga/${mangaId}/${contentType}/${currentNumber}/`;
    
    // Trova l'ultima pagina esistente (una sola richiesta binaria, non 500!)
    showToast('📖 Rilevamento pagine in corso...');
    totalPages = await findLastPage(basePath, 50);
    detectionComplete = true;
    
    if (totalPages === 0) {
      readerWrapper.innerHTML = '<div class="empty">😕 Nessuna pagina trovata</div>';
      updateUI();
      return;
    }
    
    showToast(`✅ ${totalPages} pagine trovate`);
    
    // Ora renderizza SOLO le pagine che esistono
    renderPagesExact(basePath, totalPages);
  }

  // Renderizza esattamente le pagine che esistono
  function renderPagesExact(basePath, pageCount) {
    readerWrapper.innerHTML = '';
    
    for (let i = 1; i <= pageCount; i++) {
      const pageDiv = document.createElement('div');
      pageDiv.className = 'page';
      pageDiv.setAttribute('data-page', i - 1);
      
      const img = document.createElement('img');
      img.src = `${basePath}${i}.jpg`;
      img.alt = `Pagina ${i}`;
      img.loading = 'lazy';
      
      img.onload = () => {
        img.classList.add('loaded');
      };
      
      img.onerror = () => {
        // Se un'immagine fallisce ma dovrebbe esistere, ricarica
        console.log(`Ricarico pagina ${i}`);
        setTimeout(() => {
          img.src = `${basePath}${i}.jpg?retry=${Date.now()}`;
        }, 500);
      };
      
      pageDiv.appendChild(img);
      readerWrapper.appendChild(pageDiv);
    }
    
    // Osserva quale pagina è visibile
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const idx = parseInt(entry.target.getAttribute('data-page'));
          if (!isNaN(idx)) {
            currentPageIndex = idx;
            updateUI();
          }
        }
      });
    }, { threshold: 0.5 });
    
    document.querySelectorAll('.page').forEach(page => observer.observe(page));
    
    // Scrolla alla prima pagina
    setTimeout(() => {
      const firstPage = document.querySelector('.page');
      if (firstPage) {
        firstPage.scrollIntoView({ behavior: 'instant', block: 'start' });
      }
    }, 100);
    
    updateUI();
  }

  async function nextPage() {
    if (currentPageIndex < totalPages - 1) {
      const nextPageEl = document.querySelector(`.page[data-page="${currentPageIndex + 1}"]`);
      if (nextPageEl) {
        nextPageEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    } else {
      await nextChapter();
    }
  }

  async function prevPage() {
    if (currentPageIndex > 0) {
      const prevPageEl = document.querySelector(`.page[data-page="${currentPageIndex - 1}"]`);
      if (prevPageEl) {
        prevPageEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    } else {
      await prevChapter();
    }
  }

  function updateUI() {
    if (totalPages > 0) {
      pageIndicator.textContent = `${currentPageIndex + 1} / ${totalPages}`;
    }
  }

  // Eventi tastiera
  document.addEventListener('keydown', async (e) => {
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
      e.preventDefault();
      await nextPage();
      showUI();
    }
    if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
      e.preventDefault();
      await prevPage();
      showUI();
    }
  });

  prevBtn.onclick = async () => { await prevPage(); showUI(); };
  nextBtn.onclick = async () => { await nextPage(); showUI(); };

  readerContainer.addEventListener('scroll', () => resetHideTimer());

  async function init() {
    if (!mangaId) {
      readerWrapper.innerHTML = '<div class="error">❌ Nessun manga specificato</div>';
      return;
    }
    
    const hasManifest = await loadManifest();
    
    if (!hasManifest) {
      readerWrapper.innerHTML = `
        <div class="empty">
          <h3>📝 File manifest.json mancante</h3>
          <p>Crea il file <code style="background: #1a1a2e; padding: 2px 5px; border-radius: 3px;">manga/${mangaId}/manifest.json</code></p>
          <p>Esempio: <code style="background: #1a1a2e; padding: 2px 5px; border-radius: 3px;">{"type": "chapters", "numbers": [1, 2, 3]}</code></p>
        </div>
      `;
      return;
    }
    
    if (!allNumbers.includes(currentNumber) && allNumbers.length > 0) {
      currentNumber = allNumbers[0];
      chapterSelect.value = currentNumber;
    }
    
    await loadChapter();
  }

  init();
</script>
</body>
</html>
