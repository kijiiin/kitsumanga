<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Ayashimon Reader</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            font-family: system-ui, 'Segoe UI', sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        .reader-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: black;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .image-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: black;
        }

        .manga-page {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            object-fit: contain;
            display: block;
            background: black;
        }

        .nav-btn {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            border: none;
            color: white;
            font-size: 2rem;
            font-weight: bold;
            cursor: pointer;
            padding: 0.8rem 1.2rem;
            border-radius: 40px;
            z-index: 100;
            font-family: monospace;
            border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.2s;
        }

        .nav-btn:hover {
            background: rgba(0, 0, 0, 0.9);
            transform: translateY(-50%) scale(1.05);
        }

        #prevBtn { left: 12px; }
        #nextBtn { right: 12px; }

        .info-overlay {
            position: fixed;
            bottom: 12px;
            right: 16px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            padding: 6px 12px;
            border-radius: 30px;
            color: #ddd;
            font-size: 0.8rem;
            z-index: 99;
            pointer-events: none;
            font-family: monospace;
        }

        @media (max-width: 768px) {
            .nav-btn { font-size: 1.5rem; padding: 0.5rem 1rem; }
            .info-overlay { font-size: 0.7rem; bottom: 8px; right: 10px; }
        }
    </style>
</head>
<body>
<div class="reader-container">
    <div class="image-wrapper">
        <img id="mangaImage" class="manga-page" alt="Manga page" src="">
    </div>
</div>

<button id="prevBtn" class="nav-btn">◀ PREV</button>
<button id="nextBtn" class="nav-btn">NEXT ▶</button>
<div class="info-overlay" id="pageInfo">— / —</div>

<script>
    // ============================================
    // LEGGI LE IMMAGINI DALL'URL (parametro ?pages=)
    // Esempio: reader.html?pages=1.jpg,2.jpg,3.png
    // Oppure: reader.html?folder=manga/
    // ============================================
    
    const mangaImg = document.getElementById('mangaImage');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const pageInfoSpan = document.getElementById('pageInfo');
    
    let pages = [];
    let currentIndex = 0;
    let preloadedImages = [];
    
    // Precarica tutte le immagini
    function preloadAllImages() {
        preloadedImages = [];
        for (let i = 0; i < pages.length; i++) {
            const img = new Image();
            img.src = pages[i];
            preloadedImages.push(img);
        }
    }
    
    // Mostra pagina corrente (istantaneo)
    function displayPage(index) {
        if (pages.length === 0) return;
        
        if (index < 0) index = 0;
        if (index >= pages.length) index = pages.length - 1;
        currentIndex = index;
        
        pageInfoSpan.innerText = `${currentIndex+1} / ${pages.length}`;
        
        const targetImg = preloadedImages[currentIndex];
        if (targetImg && targetImg.complete && targetImg.naturalWidth !== 0) {
            mangaImg.src = targetImg.src;
        } else {
            mangaImg.src = pages[currentIndex];
        }
    }
    
    function goPrev() {
        if (pages.length === 0) return;
        if (currentIndex > 0) displayPage(currentIndex - 1);
    }
    
    function goNext() {
        if (pages.length === 0) return;
        if (currentIndex < pages.length - 1) displayPage(currentIndex + 1);
    }
    
    // Carica pagine da un array di URL
    function loadPages(pageUrls) {
        if (!pageUrls || pageUrls.length === 0) return false;
        pages = pageUrls;
        preloadAllImages();
        currentIndex = 0;
        displayPage(0);
        return true;
    }
    
    // Leggi parametri dall'URL
    function getUrlParams() {
        const params = new URLSearchParams(window.location.search);
        
        // Metodo 1: ?pages=1.jpg,2.jpg,3.png
        if (params.has('pages')) {
            const pagesStr = params.get('pages');
            const pageUrls = pagesStr.split(',').map(p => p.trim());
            if (pageUrls.length > 0) {
                loadPages(pageUrls);
                return true;
            }
        }
        
        // Metodo 2: ?folder=cartella/ (carica 1.jpg,2.jpg,... dalla cartella)
        if (params.has('folder')) {
            let folder = params.get('folder');
            if (!folder.endsWith('/')) folder += '/';
            
            // Prova a caricare sequenzialmente
            const extensions = ['jpg', 'jpeg', 'png', 'webp'];
            let foundPages = [];
            let testIndex = 1;
            
            function tryLoadNext() {
                if (testIndex > 50) { // massimo 50 pagine
                    if (foundPages.length > 0) loadPages(foundPages);
                    return;
                }
                
                let tried = 0;
                for (let ext of extensions) {
                    const url = folder + testIndex + '.' + ext;
                    const img = new Image();
                    img.onload = () => {
                        foundPages.push(url);
                        testIndex++;
                        tryLoadNext();
                    };
                    img.onerror = () => {
                        tried++;
                        if (tried === extensions.length) {
                            // fine sequenza
                            if (foundPages.length > 0) loadPages(foundPages);
                        }
                    };
                    img.src = url;
                }
            }
            
            tryLoadNext();
            return true;
        }
        
        // Metodo 3: nessun parametro - messaggio guida
        pageInfoSpan.innerText = '?pages=1.jpg,2.jpg';
        return false;
    }
    
    // Eventi
    prevBtn.addEventListener('click', goPrev);
    nextBtn.addEventListener('click', goNext);
    
    window.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowLeft') { e.preventDefault(); goPrev(); }
        if (e.key === 'ArrowRight') { e.preventDefault(); goNext(); }
    });
    
    // Swipe touch
    let touchStartX = 0;
    const container = document.querySelector('.reader-container');
    container.addEventListener('touchstart', (e) => {
        touchStartX = e.changedTouches[0].screenX;
    });
    
    container.addEventListener('touchend', (e) => {
        const touchEndX = e.changedTouches[0].screenX;
        const delta = touchEndX - touchStartX;
        if (Math.abs(delta) > 50) {
            if (delta > 0) goPrev();
            else goNext();
            e.preventDefault();
        }
    });
    
    mangaImg.addEventListener('contextmenu', (e) => e.preventDefault());
    
    // Avvia
    getUrlParams();
</script>
</body>
</html>
