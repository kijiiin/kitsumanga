<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KitsuManga</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      color: white;
    }
    header {
      padding: 25px;
      text-align: center;
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    h1 { font-size: 2.5em; }
    .controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 1400px;
      margin: 0 auto 20px;
      padding: 0 20px;
      gap: 15px;
      flex-wrap: wrap;
    }
    .search-container {
      flex: 1;
      max-width: 400px;
      position: relative;
    }
    .search-input {
      width: 100%;
      padding: 10px 15px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(139, 92, 246, 0.5);
      border-radius: 25px;
      color: white;
      font-size: 0.9rem;
      transition: all 0.3s;
      outline: none;
    }
    .search-input:focus {
      border-color: #8b5cf6;
      background: rgba(255,255,255,0.15);
      box-shadow: 0 0 10px rgba(139, 92, 246, 0.3);
    }
    .search-input::placeholder {
      color: rgba(255,255,255,0.6);
    }
    .search-clear {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      transition: 0.2s;
    }
    .search-clear:hover {
      background: rgba(255,255,255,0.4);
    }
    .sort-select {
      background: rgba(255,255,255,0.1);
      color: white;
      border: 1px solid rgba(139, 92, 246, 0.5);
      padding: 8px 15px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.9rem;
    }
    .sort-select:hover {
      background: rgba(139, 92, 246, 0.3);
    }
    .results-info {
      font-size: 0.85rem;
      color: #c4b5fd;
      padding: 0 20px;
      margin-bottom: 15px;
      text-align: center;
    }
    .container { padding: 0 20px 30px; max-width: 1400px; margin: 0 auto; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 25px;
    }
    .card {
      background: rgba(255,255,255,0.1);
      border-radius: 15px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.3s;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .card:hover {
      transform: translateY(-8px);
      box-shadow: 0 15px 30px rgba(0,0,0,0.5);
      border-color: #8b5cf6;
    }
    .card img {
      width: 100%;
      height: 260px;
      object-fit: cover;
      background: #1a1a2e;
    }
    .info { padding: 15px; }
    .title {
      font-weight: bold;
      margin-bottom: 5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .chapter { font-size: 13px; color: #c4b5fd; }
    .no-results {
      grid-column: 1/-1;
      text-align: center;
      padding: 50px;
      color: #c4b5fd;
    }
    .add-manga {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: #8b5cf6;
      color: white;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      cursor: pointer;
      box-shadow: 0 5px 20px rgba(139, 92, 246, 0.4);
      transition: 0.3s;
      border: none;
      text-decoration: none;
      z-index: 100;
    }
    .add-manga:hover {
      transform: scale(1.1);
      background: #a78bfa;
    }
    footer {
      text-align: center;
      padding: 20px;
      background: rgba(0,0,0,0.2);
      margin-top: 40px;
    }
    
    @media (max-width: 768px) {
      h1 { font-size: 1.8em; }
      .controls { flex-direction: column; align-items: stretch; }
      .search-container { max-width: 100%; }
      .grid { gap: 15px; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
      .card img { height: 200px; }
    }
  </style>
</head>
<body>

<header>
  <h1>📚 KitsuManga</h1>
  <p style="margin-top: 10px; opacity: 0.8;">La tua libreria manga personale</p>
</header>

<div class="controls">
  <div class="search-container">
    <input type="text" class="search-input" id="searchInput" placeholder="🔍 Cerca manga..." autocomplete="off">
    <button class="search-clear" id="searchClear" style="display: none;">✕</button>
  </div>
  <select class="sort-select" id="sortSelect">
    <option value="title">📝 Ordine alfabetico</option>
    <option value="title-desc">📝 Alfabetico inverso</option>
    <option value="latest">🆕 Più recenti prima</option>
    <option value="latest-desc">🕐 Meno recenti prima</option>
    <option value="default">📋 Ordine originale (manga.json)</option>
  </select>
</div>

<div class="results-info" id="resultsInfo"></div>

<div class="container">
  <div class="grid" id="grid">
    <div style="grid-column: 1/-1; text-align: center; padding: 50px; color: #c4b5fd;">
      Caricamento libreria...
    </div>
  </div>
</div>

<a href="admin.html" class="add-manga" title="Aggiungi Manga">+</a>

<footer>
  © 2026 KitsuManga
</footer>

<script>
  const grid = document.getElementById('grid');
  const sortSelect = document.getElementById('sortSelect');
  const searchInput = document.getElementById('searchInput');
  const searchClear = document.getElementById('searchClear');
  const resultsInfo = document.getElementById('resultsInfo');
  let mangasOriginal = []; // Salva i manga originali
  let currentSearchTerm = ''; // Termine di ricerca corrente

  // Funzioni di ordinamento
  function sortByTitle(a, b) {
    return a.title.localeCompare(b.title);
  }
  
  function sortByTitleDesc(a, b) {
    return b.title.localeCompare(a.title);
  }
  
  function sortByLatest(a, b) {
    // Estrae il numero dal campo "latest"
    const getNumber = (str) => {
      const match = str?.match(/\d+/);
      return match ? parseInt(match[0]) : 0;
    };
    return getNumber(b.latest) - getNumber(a.latest);
  }
  
  function sortByLatestDesc(a, b) {
    const getNumber = (str) => {
      const match = str?.match(/\d+/);
      return match ? parseInt(match[0]) : 0;
    };
    return getNumber(a.latest) - getNumber(b.latest);
  }

  // Filtra i manga in base al termine di ricerca
  function filterMangas(mangas, searchTerm) {
    if (!searchTerm.trim()) return mangas;
    
    const term = searchTerm.toLowerCase().trim();
    return mangas.filter(m => 
      m.title.toLowerCase().includes(term) ||
      (m.latest && m.latest.toLowerCase().includes(term))
    );
  }

  function renderMangas(mangas) {
    if (mangas.length === 0) {
      grid.innerHTML = '<div class="no-results">😕 Nessun manga trovato. Prova con un\'altra ricerca o aggiungi nuovi manga con il pulsante +</div>';
      return;
    }

    grid.innerHTML = "";
    
    mangas.forEach(m => {
      const card = document.createElement("div");
      card.className = "card";
      
      card.innerHTML = `
        <img src="${m.cover}" alt="${m.title}" onerror="this.src='https://placehold.co/300x400/1a1a2e/a78bfa?text=${encodeURIComponent(m.title)}'">
        <div class="info">
          <div class="title">${m.title}</div>
          <div class="chapter">${m.latest || 'Nessun capitolo'}</div>
        </div>
      `;
      
      card.onclick = function() {
        window.location.href = 'manga-detail.html?manga=' + encodeURIComponent(m.id) + '&title=' + encodeURIComponent(m.title);
      };
      
      grid.appendChild(card);
    });
  }

  function updateResultsInfo(filteredCount, totalCount, searchTerm) {
    if (searchTerm && searchTerm.trim()) {
      resultsInfo.innerHTML = `🔍 Trovati ${filteredCount} manga su ${totalCount} per "${searchTerm.trim()}"`;
    } else {
      resultsInfo.innerHTML = `📚 Totale: ${totalCount} manga nella libreria`;
    }
  }

  function applySortAndFilter() {
    const sortType = sortSelect.value;
    let filtered = [...mangasOriginal];
    
    // Applica filtro di ricerca
    filtered = filterMangas(filtered, currentSearchTerm);
    
    // Applica ordinamento
    switch(sortType) {
      case 'title':
        filtered.sort(sortByTitle);
        break;
      case 'title-desc':
        filtered.sort(sortByTitleDesc);
        break;
      case 'latest':
        filtered.sort(sortByLatest);
        break;
      case 'latest-desc':
        filtered.sort(sortByLatestDesc);
        break;
      default:
        // Ordine originale (mantieni come nel JSON)
        break;
    }
    
    renderMangas(filtered);
    updateResultsInfo(filtered.length, mangasOriginal.length, currentSearchTerm);
  }

  // Gestione ricerca in tempo reale
  function handleSearch() {
    currentSearchTerm = searchInput.value;
    
    // Mostra/nascondi pulsante clear
    if (currentSearchTerm.length > 0) {
      searchClear.style.display = 'flex';
    } else {
      searchClear.style.display = 'none';
    }
    
    // Applica filtro e ordinamento
    applySortAndFilter();
  }

  // Clear ricerca
  function clearSearch() {
    searchInput.value = '';
    currentSearchTerm = '';
    searchClear.style.display = 'none';
    applySortAndFilter();
    searchInput.focus();
  }

  async function loadManga() {
    try {
      const res = await fetch("manga.json");
      mangasOriginal = await res.json();
      applySortAndFilter(); // Applica l'ordinamento e filtro iniziali
      
    } catch (e) {
      grid.innerHTML = '<div class="no-results" style="color: #ef4444;">❌ Errore nel caricamento dei manga</div>';
      console.error(e);
    }
  }

  // Event listeners
  sortSelect.addEventListener('change', applySortAndFilter);
  searchInput.addEventListener('input', handleSearch);
  searchClear.addEventListener('click', clearSearch);
  
  // Debounce per prestazioni (opzionale, ma utile per ricerche più fluide)
  let searchTimeout;
  searchInput.addEventListener('input', () => {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => {
      // Già gestito da handleSearch, ma evita troppi re-render
    }, 100);
  });
  
  loadManga();
</script>

</body>
</html>
