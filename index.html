<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KitsuManga - La tua libreria</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
      min-height: 100vh;
      color: #fff;
    }
    
    header {
      padding: 1.5rem;
      text-align: center;
      background: rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    
    h1 {
      font-size: 2.5rem;
      background: linear-gradient(135deg, #a78bfa, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .subtitle {
      margin-top: 0.5rem;
      opacity: 0.8;
      font-size: 1rem;
    }
    
    .stats {
      margin-top: 1rem;
      font-size: 0.9rem;
      color: #c4b5fd;
    }
    
    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem 1rem;
    }
    
    .search-bar {
      margin-bottom: 2rem;
      display: flex;
      justify-content: center;
    }
    
    .search-bar input {
      width: 100%;
      max-width: 400px;
      padding: 0.8rem 1.2rem;
      border-radius: 50px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(0, 0, 0, 0.3);
      color: white;
      font-size: 1rem;
      backdrop-filter: blur(5px);
    }
    
    .search-bar input::placeholder {
      color: rgba(255, 255, 255, 0.5);
    }
    
    .search-bar input:focus {
      outline: none;
      border-color: #8b5cf6;
      background: rgba(0, 0, 0, 0.5);
    }
    
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1.5rem;
    }
    
    .card {
      background: rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(5px);
    }
    
    .card:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      border-color: rgba(139, 92, 246, 0.5);
      background: rgba(255, 255, 255, 0.12);
    }
    
    .card-cover {
      width: 100%;
      aspect-ratio: 3/4;
      object-fit: cover;
      background: linear-gradient(135deg, #1a1a2e, #16213e);
    }
    
    .card-info {
      padding: 1rem;
    }
    
    .card-title {
      font-weight: 600;
      font-size: 1rem;
      margin-bottom: 0.3rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .card-latest {
      font-size: 0.8rem;
      color: #a78bfa;
    }
    
    .card-type {
      display: inline-block;
      margin-top: 0.5rem;
      padding: 0.2rem 0.5rem;
      background: rgba(139, 92, 246, 0.2);
      border-radius: 12px;
      font-size: 0.7rem;
      color: #c4b5fd;
    }
    
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 4rem 2rem;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 20px;
      border: 1px dashed rgba(255, 255, 255, 0.2);
    }
    
    .empty-state h3 {
      margin-bottom: 1rem;
      color: #c4b5fd;
    }
    
    .empty-state p {
      opacity: 0.7;
    }
    
    .add-button {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: linear-gradient(135deg, #8b5cf6, #ec4899);
      color: white;
      border: none;
      font-size: 2rem;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(139, 92, 246, 0.4);
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 20;
    }
    
    .add-button:hover {
      transform: scale(1.1) rotate(90deg);
      box-shadow: 0 6px 30px rgba(236, 72, 153, 0.4);
    }
    
    footer {
      text-align: center;
      padding: 2rem;
      background: rgba(0, 0, 0, 0.2);
      margin-top: 3rem;
      color: rgba(255, 255, 255, 0.6);
      font-size: 0.9rem;
    }
    
    .loading {
      grid-column: 1 / -1;
      text-align: center;
      padding: 3rem;
    }
    
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-top-color: #8b5cf6;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 1rem;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

<header>
  <h1>📚 KitsuManga</h1>
  <div class="subtitle">La tua biblioteca manga personale</div>
  <div class="stats" id="stats"></div>
</header>

<div class="container">
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="🔍 Cerca un manga..." autocomplete="off">
  </div>
  
  <div class="grid" id="mangaGrid">
    <div class="loading">
      <div class="spinner"></div>
      <div>Caricamento libreria...</div>
    </div>
  </div>
</div>

<a href="admin.html" class="add-button" title="Aggiungi Manga">+</a>

<footer>
  © 2026 KitsuManga • Leggi i tuoi manga preferiti
</footer>

<script>
  let allManga = [];
  const grid = document.getElementById('mangaGrid');
  const searchInput = document.getElementById('searchInput');
  const stats = document.getElementById('stats');

  async function loadManga() {
    try {
      const response = await fetch('manga.json');
      if (!response.ok) throw new Error('Impossibile caricare manga.json');
      
      allManga = await response.json();
      updateStats();
      renderGrid(allManga);
      
    } catch (error) {
      console.error('Errore:', error);
      grid.innerHTML = `
        <div class="empty-state">
          <h3>😕 Ops! Qualcosa è andato storto</h3>
          <p>Assicurati che il file manga.json esista e sia formattato correttamente.</p>
        </div>
      `;
    }
  }

  function updateStats() {
    const count = allManga.length;
    stats.textContent = `${count} manga nella libreria`;
  }

  function renderGrid(mangaList) {
    if (mangaList.length === 0) {
      grid.innerHTML = `
        <div class="empty-state">
          <h3>📖 Libreria vuota</h3>
          <p>Clicca il + in basso a destra per aggiungere il tuo primo manga!</p>
        </div>
      `;
      return;
    }

    grid.innerHTML = mangaList.map(manga => `
      <div class="card" onclick="openReader('${manga.id}', '${manga.title.replace(/'/g, "\\'")}')">
        <img class="card-cover" 
             src="${manga.cover}" 
             alt="${manga.title}"
             onerror="this.src='https://placehold.co/300x400/1a1a2e/a78bfa?text=${encodeURIComponent(manga.title.substring(0, 10))}'">
        <div class="card-info">
          <div class="card-title">${manga.title}</div>
          <div class="card-latest">${manga.latest || 'Nuovo'}</div>
          <span class="card-type">${manga.type || '📖 Manga'}</span>
        </div>
      </div>
    `).join('');
  }

  function openReader(mangaId, mangaTitle) {
    window.location.href = `reader.html?manga=${encodeURIComponent(mangaId)}&title=${encodeURIComponent(mangaTitle)}`;
  }

  // Ricerca in tempo reale
  searchInput.addEventListener('input', (e) => {
    const query = e.target.value.toLowerCase().trim();
    
    if (query === '') {
      renderGrid(allManga);
      return;
    }
    
    const filtered = allManga.filter(manga => 
      manga.title.toLowerCase().includes(query) ||
      (manga.author && manga.author.toLowerCase().includes(query))
    );
    
    renderGrid(filtered);
  });

  // Carica tutto all'avvio
  loadManga();
</script>

</body>
</html>
