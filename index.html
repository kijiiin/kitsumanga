<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KitsuManga</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      color: white;
    }
    header {
      padding: 25px;
      text-align: center;
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    h1 { font-size: 2.5em; }
    .controls {
      display: flex;
      justify-content: flex-end;
      max-width: 1400px;
      margin: 0 auto 20px;
      padding: 0 20px;
    }
    .sort-select {
      background: rgba(255,255,255,0.1);
      color: white;
      border: 1px solid rgba(139, 92, 246, 0.5);
      padding: 8px 15px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.9rem;
    }
    .sort-select:hover {
      background: rgba(139, 92, 246, 0.3);
    }
    .container { padding: 0 20px 30px; max-width: 1400px; margin: 0 auto; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 25px;
    }
    .card {
      background: rgba(255,255,255,0.1);
      border-radius: 15px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.3s;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .card:hover {
      transform: translateY(-8px);
      box-shadow: 0 15px 30px rgba(0,0,0,0.5);
      border-color: #8b5cf6;
    }
    .card img {
      width: 100%;
      height: 260px;
      object-fit: cover;
      background: #1a1a2e;
    }
    .info { padding: 15px; }
    .title {
      font-weight: bold;
      margin-bottom: 5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .chapter { font-size: 13px; color: #c4b5fd; }
    .add-manga {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: #8b5cf6;
      color: white;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      cursor: pointer;
      box-shadow: 0 5px 20px rgba(139, 92, 246, 0.4);
      transition: 0.3s;
      border: none;
      text-decoration: none;
    }
    .add-manga:hover {
      transform: scale(1.1);
      background: #a78bfa;
    }
    footer {
      text-align: center;
      padding: 20px;
      background: rgba(0,0,0,0.2);
      margin-top: 40px;
    }
  </style>
</head>
<body>

<header>
  <h1>📚 KitsuManga</h1>
  <p style="margin-top: 10px; opacity: 0.8;">La tua libreria manga personale</p>
</header>

<div class="controls">
  <select class="sort-select" id="sortSelect">
    <option value="title">📝 Ordine alfabetico</option>
    <option value="title-desc">📝 Alfabetico inverso</option>
    <option value="latest">🆕 Più recenti prima</option>
    <option value="latest-desc">🕐 Meno recenti prima</option>
    <option value="default">📋 Ordine originale (manga.json)</option>
  </select>
</div>

<div class="container">
  <div class="grid" id="grid">
    <div style="grid-column: 1/-1; text-align: center; padding: 50px; color: #c4b5fd;">
      Caricamento libreria...
    </div>
  </div>
</div>

<a href="admin.html" class="add-manga" title="Aggiungi Manga">+</a>

<footer>
  © 2026 KitsuManga
</footer>

<script>
  const grid = document.getElementById('grid');
  const sortSelect = document.getElementById('sortSelect');
  let mangasOriginal = []; // Salva i manga originali

  // Funzioni di ordinamento
  function sortByTitle(a, b) {
    return a.title.localeCompare(b.title);
  }
  
  function sortByTitleDesc(a, b) {
    return b.title.localeCompare(a.title);
  }
  
  function sortByLatest(a, b) {
    // Estrae il numero dal campo "latest"
    const getNumber = (str) => {
      const match = str?.match(/\d+/);
      return match ? parseInt(match[0]) : 0;
    };
    return getNumber(b.latest) - getNumber(a.latest);
  }
  
  function sortByLatestDesc(a, b) {
    const getNumber = (str) => {
      const match = str?.match(/\d+/);
      return match ? parseInt(match[0]) : 0;
    };
    return getNumber(a.latest) - getNumber(b.latest);
  }

  function renderMangas(mangas) {
    if (mangas.length === 0) {
      grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 50px;">Nessun manga nella libreria. Clicca il + per aggiungerne uno.</div>';
      return;
    }

    grid.innerHTML = "";
    
    mangas.forEach(m => {
      const card = document.createElement("div");
      card.className = "card";
      
      card.innerHTML = `
        <img src="${m.cover}" alt="${m.title}" onerror="this.src='https://placehold.co/300x400/1a1a2e/a78bfa?text=${encodeURIComponent(m.title)}'">
        <div class="info">
          <div class="title">${m.title}</div>
          <div class="chapter">${m.latest || 'Nessun capitolo'}</div>
        </div>
      `;
      
      card.onclick = function() {
        window.location.href = 'manga-detail.html?manga=' + encodeURIComponent(m.id) + '&title=' + encodeURIComponent(m.title);
      };
      
      grid.appendChild(card);
    });
  }

  function applySort() {
    const sortType = sortSelect.value;
    let sorted = [...mangasOriginal];
    
    switch(sortType) {
      case 'title':
        sorted.sort(sortByTitle);
        break;
      case 'title-desc':
        sorted.sort(sortByTitleDesc);
        break;
      case 'latest':
        sorted.sort(sortByLatest);
        break;
      case 'latest-desc':
        sorted.sort(sortByLatestDesc);
        break;
      default:
        // Ordine originale (mantieni come nel JSON)
        break;
    }
    
    renderMangas(sorted);
  }

  async function loadManga() {
    try {
      const res = await fetch("manga.json");
      mangasOriginal = await res.json();
      applySort(); // Applica l'ordinamento iniziale
      
    } catch (e) {
      grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 50px; color: #ef4444;">Errore nel caricamento dei manga</div>';
      console.error(e);
    }
  }

  // Quando cambia il selettore, riordina
  sortSelect.addEventListener('change', applySort);
  
  loadManga();
</script>

</body>
</html>
