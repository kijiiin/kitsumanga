<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KitsuManga</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      color: white;
    }
    header {
      padding: 25px;
      text-align: center;
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    h1 { font-size: 2.5em; }
    .controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 1400px;
      margin: 0 auto 20px;
      padding: 0 20px;
      gap: 15px;
      flex-wrap: wrap;
    }
    .search-container {
      flex: 1;
      max-width: 400px;
      position: relative;
    }
    .search-input {
      width: 100%;
      padding: 10px 15px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(139, 92, 246, 0.5);
      border-radius: 25px;
      color: white;
      font-size: 0.9rem;
      transition: all 0.3s;
      outline: none;
    }
    .search-input:focus {
      border-color: #8b5cf6;
      background: rgba(255,255,255,0.15);
      box-shadow: 0 0 10px rgba(139, 92, 246, 0.3);
    }
    .search-input::placeholder {
      color: rgba(255,255,255,0.6);
    }
    .search-clear {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      transition: 0.2s;
    }
    .search-clear:hover {
      background: rgba(255,255,255,0.4);
    }
    .sort-select {
      background: rgba(255,255,255,0.1);
      color: white;
      border: 1px solid rgba(139, 92, 246, 0.5);
      padding: 8px 15px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.9rem;
    }
    .sort-select:hover {
      background: rgba(139, 92, 246, 0.3);
    }
    .reload-btn {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(139, 92, 246, 0.5);
      padding: 8px 15px;
      border-radius: 20px;
      cursor: pointer;
      color: white;
      font-size: 0.9rem;
      transition: 0.3s;
    }
    .reload-btn:hover {
      background: rgba(139, 92, 246, 0.3);
      transform: scale(1.02);
    }
    .admin-btn {
      background: rgba(239, 68, 68, 0.3);
      border: 1px solid rgba(239, 68, 68, 0.5);
      padding: 8px 15px;
      border-radius: 20px;
      cursor: pointer;
      color: white;
      font-size: 0.9rem;
      transition: 0.3s;
    }
    .admin-btn:hover {
      background: rgba(239, 68, 68, 0.5);
      transform: scale(1.02);
    }
    .results-info {
      font-size: 0.85rem;
      color: #c4b5fd;
      padding: 0 20px;
      margin-bottom: 15px;
      text-align: center;
    }
    .tabs {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 30px;
      padding: 0 20px;
    }
    .tab-btn {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(139, 92, 246, 0.3);
      padding: 10px 25px;
      border-radius: 25px;
      cursor: pointer;
      color: white;
      font-size: 1rem;
      transition: 0.3s;
    }
    .tab-btn.active {
      background: #8b5cf6;
      border-color: #8b5cf6;
      box-shadow: 0 0 15px rgba(139, 92, 246, 0.5);
    }
    .tab-btn:hover:not(.active) {
      background: rgba(139, 92, 246, 0.3);
    }
    .container { padding: 0 20px 30px; max-width: 1400px; margin: 0 auto; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 25px;
    }
    .card {
      background: rgba(255,255,255,0.1);
      border-radius: 15px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.3s;
      border: 1px solid rgba(255,255,255,0.1);
      position: relative;
    }
    .card:hover {
      transform: translateY(-8px);
      box-shadow: 0 15px 30px rgba(0,0,0,0.5);
      border-color: #8b5cf6;
    }
    .card img {
      width: 100%;
      height: 260px;
      object-fit: cover;
      background: #1a1a2e;
    }
    .info { padding: 15px; }
    .title {
      font-weight: bold;
      margin-bottom: 5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .chapter { font-size: 13px; color: #c4b5fd; }
    .external-badge {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(139, 92, 246, 0.9);
      padding: 4px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: bold;
      backdrop-filter: blur(5px);
    }
    .request-badge {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(239, 68, 68, 0.9);
      padding: 4px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: bold;
      backdrop-filter: blur(5px);
    }
    .status-badge {
      position: absolute;
      bottom: 10px;
      right: 10px;
      padding: 4px 8px;
      border-radius: 12px;
      font-size: 10px;
      font-weight: bold;
    }
    .status-pending { background: rgba(245, 158, 11, 0.9); }
    .status-approved { background: rgba(16, 185, 129, 0.9); }
    .status-rejected { background: rgba(239, 68, 68, 0.9); }
    .no-results {
      grid-column: 1/-1;
      text-align: center;
      padding: 50px;
      color: #c4b5fd;
    }
    .add-manga {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: #8b5cf6;
      color: white;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      cursor: pointer;
      box-shadow: 0 5px 20px rgba(139, 92, 246, 0.4);
      transition: 0.3s;
      border: none;
      text-decoration: none;
      z-index: 100;
    }
    .add-manga:hover {
      transform: scale(1.1);
      background: #a78bfa;
    }
    footer {
      text-align: center;
      padding: 20px;
      background: rgba(0,0,0,0.2);
      margin-top: 40px;
    }
    
    /* Modal per richieste */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      z-index: 2000;
      align-items: center;
      justify-content: center;
    }
    .modal.active {
      display: flex;
    }
    .modal-content {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      border-radius: 20px;
      padding: 30px;
      max-width: 500px;
      width: 90%;
      border: 1px solid #8b5cf6;
      max-height: 85vh;
      overflow-y: auto;
    }
    .modal-content h2 {
      margin-bottom: 20px;
      color: #c4b5fd;
    }
    .modal-content input, .modal-content textarea {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(139, 92, 246, 0.5);
      border-radius: 10px;
      color: white;
      font-size: 0.9rem;
    }
    .modal-content textarea {
      resize: vertical;
      min-height: 80px;
    }
    .modal-content button {
      background: #8b5cf6;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 1rem;
      margin-right: 10px;
    }
    .modal-content button:hover {
      background: #a78bfa;
    }
    .close-modal {
      background: rgba(255,255,255,0.2) !important;
    }
    .cover-preview {
      margin-bottom: 15px;
      text-align: center;
    }
    .cover-preview img {
      max-width: 100px;
      max-height: 150px;
      border-radius: 10px;
      border: 2px solid #8b5cf6;
      display: none;
    }
    .cover-preview img.show {
      display: inline-block;
    }
    .input-hint {
      font-size: 0.7rem;
      color: #9ca3af;
      margin-top: -12px;
      margin-bottom: 15px;
    }
    
    /* Pannello admin */
    .admin-panel {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.95);
      z-index: 3000;
      overflow-y: auto;
      padding: 20px;
    }
    .admin-panel.active {
      display: block;
    }
    .admin-container {
      max-width: 1200px;
      margin: 0 auto;
    }
    .request-card {
      background: rgba(255,255,255,0.1);
      border-radius: 15px;
      padding: 20px;
      margin-bottom: 20px;
      border: 1px solid rgba(139, 92, 246, 0.3);
    }
    .request-card h3 {
      color: #c4b5fd;
      margin-bottom: 10px;
    }
    .request-card p {
      margin-bottom: 8px;
      opacity: 0.9;
    }
    .request-card .cover-thumb {
      max-width: 80px;
      max-height: 120px;
      border-radius: 8px;
      margin-top: 10px;
    }
    .request-actions {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }
    .approve-btn {
      background: #10b981;
      color: white;
      border: none;
      padding: 8px 20px;
      border-radius: 8px;
      cursor: pointer;
    }
    .reject-btn {
      background: #ef4444;
      color: white;
      border: none;
      padding: 8px 20px;
      border-radius: 8px;
      cursor: pointer;
    }
    .admin-close {
      position: fixed;
      top: 20px;
      right: 20px;
      background: #ef4444;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 20px;
      cursor: pointer;
      z-index: 3001;
    }
    
    .toast {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.9);
      color: #c4b5fd;
      padding: 12px 24px;
      border-radius: 40px;
      font-size: 0.9rem;
      z-index: 2000;
      animation: toastFade 3s ease forwards;
      pointer-events: none;
      white-space: nowrap;
      border: 1px solid #8b5cf6;
    }
    @keyframes toastFade {
      0% { opacity: 0; transform: translateX(-50%) translateY(20px); }
      15% { opacity: 1; transform: translateX(-50%) translateY(0); }
      85% { opacity: 1; transform: translateX(-50%) translateY(0); }
      100% { opacity: 0; transform: translateX(-50%) translateY(-20px); visibility: hidden; }
    }
    
    @media (max-width: 768px) {
      h1 { font-size: 1.8em; }
      .controls { flex-direction: column; align-items: stretch; }
      .search-container { max-width: 100%; }
      .grid { gap: 15px; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
      .card img { height: 200px; }
      .tab-btn { padding: 6px 15px; font-size: 0.85rem; }
      .toast { font-size: 0.8rem; padding: 8px 16px; white-space: nowrap; bottom: 80px; }
    }
  </style>
</head>
<body>

<header>
  <h1>📚 KitsuManga</h1>
  <p style="margin-top: 10px; opacity: 0.8;">La tua libreria manga personale</p>
</header>

<div class="controls">
  <div class="search-container">
    <input type="text" class="search-input" id="searchInput" placeholder="🔍 Cerca manga..." autocomplete="off">
    <button class="search-clear" id="searchClear" style="display: none;">✕</button>
  </div>
  <select class="sort-select" id="sortSelect">
    <option value="title">📝 Ordine alfabetico</option>
    <option value="title-desc">📝 Alfabetico inverso</option>
    <option value="latest">🆕 Più recenti prima</option>
    <option value="latest-desc">🕐 Meno recenti prima</option>
    <option value="default">📋 Ordine originale</option>
  </select>
  <button class="reload-btn" id="reloadBtn">🔄 Ricarica</button>
  <button class="admin-btn" id="adminBtn">🔒 Admin</button>
</div>

<div class="tabs">
  <button class="tab-btn active" data-tab="local">📁 Manga Locali</button>
  <button class="tab-btn" data-tab="external">🌐 Manga Esterni</button>
  <button class="tab-btn" data-tab="requests">📋 Richieste</button>
</div>

<div class="results-info" id="resultsInfo"></div>

<div class="container">
  <div class="grid" id="grid">
    <div style="grid-column: 1/-1; text-align: center; padding: 50px; color: #c4b5fd;">
      Caricamento libreria...
    </div>
  </div>
</div>

<button class="add-manga" id="addMangaBtn" title="Richiedi un manga">+</button>

<footer>
  © 2026 KitsuManga
</footer>

<!-- Modal per richieste con campo cover -->
<div class="modal" id="requestModal">
  <div class="modal-content">
    <h2>📝 Richiedi un manga</h2>
    <input type="text" id="reqTitle" placeholder="Titolo del manga *">
    <input type="text" id="reqAuthor" placeholder="Autore">
    <input type="url" id="reqCover" placeholder="URL della cover (copertina)">
    <div class="cover-preview">
      <img id="coverPreview" alt="Anteprima cover">
    </div>
    <div class="input-hint">💡 Inserisci un link diretto all'immagine della copertina (opzionale)</div>
    <input type="url" id="reqUrl" placeholder="URL dove leggerlo (es. sito manga)">
    <textarea id="reqReason" placeholder="Motivo della richiesta (opzionale)"></textarea>
    <input type="text" id="reqRequester" placeholder="Il tuo nome/nickname *">
    <button id="submitRequest">Invia richiesta</button>
    <button class="close-modal" id="closeModal">Annulla</button>
  </div>
</div>

<!-- Pannello Admin -->
<div class="admin-panel" id="adminPanel">
  <button class="admin-close" id="closeAdmin">✕ Chiudi</button>
  <div class="admin-container">
    <h2 style="margin-bottom: 20px;">🔒 Pannello Richieste</h2>
    <div id="requestsList"></div>
  </div>
</div>

<script>
  const grid = document.getElementById('grid');
  const sortSelect = document.getElementById('sortSelect');
  const searchInput = document.getElementById('searchInput');
  const searchClear = document.getElementById('searchClear');
  const resultsInfo = document.getElementById('resultsInfo');
  const tabs = document.querySelectorAll('.tab-btn');
  const addMangaBtn = document.getElementById('addMangaBtn');
  const reloadBtn = document.getElementById('reloadBtn');
  const adminBtn = document.getElementById('adminBtn');
  const requestModal = document.getElementById('requestModal');
  const adminPanel = document.getElementById('adminPanel');
  const submitRequest = document.getElementById('submitRequest');
  const closeModal = document.getElementById('closeModal');
  const closeAdmin = document.getElementById('closeAdmin');
  
  let mangasLocal = [];
  let mangasExternal = [];
  let mangaRequests = [];
  let currentTab = 'local';
  let currentSearchTerm = '';
  let isAdminAuthenticated = false;
  const ADMIN_PASSWORD = 'admin123';

  // Anteprima cover
  const reqCoverInput = document.getElementById('reqCover');
  const coverPreview = document.getElementById('coverPreview');
  
  reqCoverInput.addEventListener('input', () => {
    const url = reqCoverInput.value.trim();
    if (url && (url.startsWith('http://') || url.startsWith('https://'))) {
      coverPreview.src = url;
      coverPreview.classList.add('show');
      coverPreview.onerror = () => {
        coverPreview.classList.remove('show');
      };
    } else {
      coverPreview.classList.remove('show');
    }
  });

  // Carica richieste da localStorage
  function loadRequests() {
    const saved = localStorage.getItem('mangaRequests');
    if (saved) {
      mangaRequests = JSON.parse(saved);
    } else {
      mangaRequests = [];
    }
  }

  // Salva richieste in localStorage
  function saveRequests() {
    localStorage.setItem('mangaRequests', JSON.stringify(mangaRequests));
  }

  function showToast(message, isError = false) {
    const existingToast = document.querySelector('.toast');
    if (existingToast) existingToast.remove();
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.textContent = message;
    if (isError) toast.style.borderColor = '#ef4444';
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
  }

  function authenticateAdmin() {
    const password = prompt('Inserisci la password amministratore:');
    if (password === ADMIN_PASSWORD) {
      isAdminAuthenticated = true;
      showAdminPanel();
      showToast('✅ Accesso amministratore consentito');
    } else if (password !== null) {
      showToast('❌ Password errata', true);
    }
  }

  function showAdminPanel() {
    adminPanel.classList.add('active');
    renderAdminRequests();
  }

  function renderAdminRequests() {
    const container = document.getElementById('requestsList');
    if (mangaRequests.length === 0) {
      container.innerHTML = '<div style="text-align:center;padding:50px;">📭 Nessuna richiesta in sospeso</div>';
      return;
    }
    
    container.innerHTML = '';
    mangaRequests.forEach((req, index) => {
      const card = document.createElement('div');
      card.className = 'request-card';
      card.innerHTML = `
        <h3>${escapeHtml(req.title)}</h3>
        <p><strong>Richiedente:</strong> ${escapeHtml(req.requester)}</p>
        <p><strong>Autore:</strong> ${escapeHtml(req.author || 'Non specificato')}</p>
        ${req.cover ? `<p><strong>Cover:</strong> <a href="${req.cover}" target="_blank" style="color:#c4b5fd;">Visualizza immagine</a><br><img src="${req.cover}" class="cover-thumb" onerror="this.style.display='none'"></p>` : '<p><strong>Cover:</strong> Non fornita</p>'}
        <p><strong>URL:</strong> ${req.url ? `<a href="${req.url}" target="_blank" style="color:#c4b5fd;">${req.url.substring(0, 50)}...</a>` : 'Non specificato'}</p>
        <p><strong>Motivo:</strong> ${escapeHtml(req.reason || 'Nessun motivo specificato')}</p>
        <p><strong>Data:</strong> ${new Date(req.date).toLocaleString()}</p>
        <p><strong>Stato:</strong> <span style="color:${req.status === 'approved' ? '#10b981' : (req.status === 'rejected' ? '#ef4444' : '#f59e0b')}">${req.status === 'approved' ? '✅ Approvata' : (req.status === 'rejected' ? '❌ Respinta' : '⏳ In attesa')}</span></p>
        <div class="request-actions">
          ${req.status === 'pending' ? `<button class="approve-btn" data-index="${index}">✅ Approva</button>` : ''}
          ${req.status === 'pending' ? `<button class="reject-btn" data-index="${index}">❌ Rifiuta</button>` : ''}
          <button class="reject-btn" data-index="${index}" data-delete="true" style="background:#6b7280;">🗑️ Elimina</button>
        </div>
      `;
      container.appendChild(card);
    });
    
    document.querySelectorAll('.approve-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const idx = parseInt(btn.dataset.index);
        approveRequest(idx);
      });
    });
    document.querySelectorAll('.reject-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const idx = parseInt(btn.dataset.index);
        if (btn.dataset.delete) {
          deleteRequest(idx);
        } else {
          rejectRequest(idx);
        }
      });
    });
  }

  function approveRequest(index) {
    mangaRequests[index].status = 'approved';
    saveRequests();
    renderAdminRequests();
    showToast('✅ Richiesta approvata!');
    if (currentTab === 'requests') renderRequestsTab();
  }

  function rejectRequest(index) {
    mangaRequests[index].status = 'rejected';
    saveRequests();
    renderAdminRequests();
    showToast('❌ Richiesta rifiutata');
    if (currentTab === 'requests') renderRequestsTab();
  }

  function deleteRequest(index) {
    mangaRequests.splice(index, 1);
    saveRequests();
    renderAdminRequests();
    if (currentTab === 'requests') renderRequestsTab();
    showToast('🗑️ Richiesta eliminata');
  }

  function addRequest() {
    const title = document.getElementById('reqTitle').value.trim();
    const author = document.getElementById('reqAuthor').value.trim();
    const cover = document.getElementById('reqCover').value.trim();
    const url = document.getElementById('reqUrl').value.trim();
    const reason = document.getElementById('reqReason').value.trim();
    const requester = document.getElementById('reqRequester').value.trim();
    
    if (!title || !requester) {
      showToast('❌ Titolo e nome richiedente sono obbligatori', true);
      return;
    }
    
    const newRequest = {
      id: Date.now(),
      title: title,
      author: author,
      cover: cover || null,
      url: url,
      reason: reason,
      requester: requester,
      date: new Date().toISOString(),
      status: 'pending'
    };
    
    mangaRequests.push(newRequest);
    saveRequests();
    
    // Reset form
    document.getElementById('reqTitle').value = '';
    document.getElementById('reqAuthor').value = '';
    document.getElementById('reqCover').value = '';
    document.getElementById('reqUrl').value = '';
    document.getElementById('reqReason').value = '';
    document.getElementById('reqRequester').value = '';
    coverPreview.classList.remove('show');
    
    requestModal.classList.remove('active');
    showToast('✅ Richiesta inviata! Verrà esaminata al più presto.');
  }

  function renderRequestsTab() {
    if (mangaRequests.length === 0) {
      grid.innerHTML = '<div class="no-results">📭 Nessuna richiesta inviata. Clicca sul pulsante + per richiedere un manga!</div>';
      return;
    }
    
    grid.innerHTML = '';
    
    const pending = mangaRequests.filter(r => r.status === 'pending');
    const approved = mangaRequests.filter(r => r.status === 'approved');
    const rejected = mangaRequests.filter(r => r.status === 'rejected');
    
    if (pending.length > 0) {
      pending.forEach(req => {
        grid.appendChild(createRequestCard(req));
      });
    }
    if (approved.length > 0) {
      approved.forEach(req => {
        grid.appendChild(createRequestCard(req));
      });
    }
    if (rejected.length > 0) {
      rejected.forEach(req => {
        grid.appendChild(createRequestCard(req));
      });
    }
  }
  
  function createRequestCard(req) {
    const card = document.createElement('div');
    card.className = 'card';
    
    let statusClass = '';
    let statusLabel = '';
    if (req.status === 'pending') {
      statusClass = 'status-pending';
      statusLabel = '⏳ In attesa';
    } else if (req.status === 'approved') {
      statusClass = 'status-approved';
      statusLabel = '✅ Approvata';
    } else {
      statusClass = 'status-rejected';
      statusLabel = '❌ Respinta';
    }
    
    const coverUrl = req.cover && req.cover.startsWith('http') ? req.cover : `https://placehold.co/300x400/1a1a2e/a78bfa?text=${encodeURIComponent(req.title)}`;
    
    card.innerHTML = `
      <div class="request-badge">📋 RICHIESTO</div>
      <div class="status-badge ${statusClass}">${statusLabel}</div>
      <img src="${coverUrl}" alt="${req.title}" onerror="this.src='https://placehold.co/300x400/1a1a2e/a78bfa?text=${encodeURIComponent(req.title)}'">
      <div class="info">
        <div class="title">${escapeHtml(req.title)}</div>
        <div class="chapter">Richiesto da: ${escapeHtml(req.requester)}</div>
        ${req.author ? `<div class="chapter" style="font-size: 11px;">✍️ ${escapeHtml(req.author)}</div>` : ''}
        ${req.reason ? `<div class="chapter" style="font-size: 11px; margin-top: 5px;">💬 ${escapeHtml(req.reason.substring(0, 50))}${req.reason.length > 50 ? '...' : ''}</div>` : ''}
      </div>
    `;
    
    return card;
  }

  // Carica manga locali
  async function loadLocalMangas() {
    try {
      const timestamp = Date.now();
      const res = await fetch(`manga.json?t=${timestamp}`);
      const data = await res.json();
      mangasLocal = data.map(m => ({ ...m, type: 'local' }));
      console.log('✅ Manga locali caricati:', mangasLocal.length);
    } catch (e) {
      console.error('Errore nel caricamento manga locali:', e);
      mangasLocal = [];
    }
  }

  async function loadExternalMangas(forceReload = false) {
    try {
      const cacheBuster = forceReload ? Date.now() : Date.now();
      const res = await fetch(`external.json?t=${cacheBuster}&_=${Date.now()}`);
      if (res.ok) {
        const data = await res.json();
        mangasExternal = data.map(m => ({ ...m, type: 'external' }));
        console.log('✅ Manga esterni caricati:', mangasExternal.length);
        sessionStorage.setItem('externalMangas', JSON.stringify(mangasExternal));
        return true;
      } else {
        const cached = sessionStorage.getItem('externalMangas');
        if (cached) {
          mangasExternal = JSON.parse(cached);
          console.log('📦 Manga esterni caricati da cache locale:', mangasExternal.length);
        } else {
          mangasExternal = [];
        }
        return false;
      }
    } catch (e) {
      const cached = sessionStorage.getItem('externalMangas');
      if (cached) {
        mangasExternal = JSON.parse(cached);
        console.log('📦 Manga esterni caricati da cache locale:', mangasExternal.length);
      } else {
        mangasExternal = [];
      }
      return false;
    }
  }

  function sortByTitle(a, b) {
    return a.title.localeCompare(b.title);
  }
  
  function sortByTitleDesc(a, b) {
    return b.title.localeCompare(a.title);
  }
  
  function sortByLatest(a, b) {
    const getNumber = (str) => {
      const match = str?.match(/\d+/);
      return match ? parseInt(match[0]) : 0;
    };
    return getNumber(b.latest) - getNumber(a.latest);
  }
  
  function sortByLatestDesc(a, b) {
    const getNumber = (str) => {
      const match = str?.match(/\d+/);
      return match ? parseInt(match[0]) : 0;
    };
    return getNumber(a.latest) - getNumber(b.latest);
  }

  function filterMangas(mangas, searchTerm) {
    if (!searchTerm.trim()) return mangas;
    const term = searchTerm.toLowerCase().trim();
    return mangas.filter(m => 
      m.title.toLowerCase().includes(term) ||
      (m.latest && m.latest.toLowerCase().includes(term)) ||
      (m.author && m.author.toLowerCase().includes(term))
    );
  }

  function renderMangas(mangas) {
    if (mangas.length === 0) {
      if (currentTab === 'local') {
        grid.innerHTML = '<div class="no-results">😕 Nessun manga locale trovato.</div>';
      } else if (currentTab === 'external') {
        grid.innerHTML = '<div class="no-results">🌐 Nessun manga esterno trovato.</div>';
      }
      return;
    }

    grid.innerHTML = "";
    
    mangas.forEach(m => {
      const card = document.createElement("div");
      card.className = "card";
      
      const externalBadge = m.type === 'external' ? '<div class="external-badge">🌐 ESTERNO</div>' : '';
      
      card.innerHTML = `
        ${externalBadge}
        <img src="${m.cover}" alt="${m.title}" onerror="this.src='https://placehold.co/300x400/1a1a2e/a78bfa?text=${encodeURIComponent(m.title)}'">
        <div class="info">
          <div class="title">${escapeHtml(m.title)}</div>
          <div class="chapter">${m.latest || 'Nessun capitolo'}</div>
          ${m.author ? `<div class="chapter" style="font-size: 11px;">✍️ ${escapeHtml(m.author)}</div>` : ''}
        </div>
      `;
      
      card.onclick = function() {
        if (m.type === 'local') {
          window.location.href = 'manga-detail.html?manga=' + encodeURIComponent(m.id) + '&title=' + encodeURIComponent(m.title);
        } else {
          window.location.href = `external-reader.html?url=${encodeURIComponent(m.externalUrl)}&title=${encodeURIComponent(m.title)}`;
        }
      };
      
      grid.appendChild(card);
    });
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  function updateResultsInfo(filteredCount, totalCount, searchTerm) {
    let tabLabel = '';
    if (currentTab === 'local') tabLabel = 'manga locali';
    else if (currentTab === 'external') tabLabel = 'manga esterni';
    else tabLabel = 'richieste';
    
    if (searchTerm && searchTerm.trim()) {
      resultsInfo.innerHTML = `🔍 Trovati ${filteredCount} ${tabLabel} su ${totalCount} per "${escapeHtml(searchTerm.trim())}"`;
    } else {
      resultsInfo.innerHTML = `📚 Totale: ${totalCount} ${tabLabel}`;
    }
  }

  function getCurrentItems() {
    if (currentTab === 'local') return [...mangasLocal];
    if (currentTab === 'external') return [...mangasExternal];
    return [...mangaRequests];
  }

  function applySortAndFilter() {
    if (currentTab === 'requests') {
      const items = getCurrentItems();
      const totalCount = items.length;
      let filtered = filterMangas(items, currentSearchTerm);
      renderRequestsTabContent(filtered);
      updateResultsInfo(filtered.length, totalCount, currentSearchTerm);
      return;
    }
    
    const sortType = sortSelect.value;
    let mangas = getCurrentItems();
    const totalCount = mangas.length;
    let filtered = filterMangas(mangas, currentSearchTerm);
    
    switch(sortType) {
      case 'title':
        filtered.sort(sortByTitle);
        break;
      case 'title-desc':
        filtered.sort(sortByTitleDesc);
        break;
      case 'latest':
        filtered.sort(sortByLatest);
        break;
      case 'latest-desc':
        filtered.sort(sortByLatestDesc);
        break;
      default:
        break;
    }
    
    renderMangas(filtered);
    updateResultsInfo(filtered.length, totalCount, currentSearchTerm);
  }
  
  function renderRequestsTabContent(requests) {
    if (requests.length === 0) {
      grid.innerHTML = '<div class="no-results">📭 Nessuna richiesta trovata</div>';
      return;
    }
    
    grid.innerHTML = '';
    
    const pending = requests.filter(r => r.status === 'pending');
    const approved = requests.filter(r => r.status === 'approved');
    const rejected = requests.filter(r => r.status === 'rejected');
    
    if (pending.length > 0) {
      pending.forEach(req => {
        grid.appendChild(createRequestCard(req));
      });
    }
    if (approved.length > 0) {
      approved.forEach(req => {
        grid.appendChild(createRequestCard(req));
      });
    }
    if (rejected.length > 0) {
      rejected.forEach(req => {
        grid.appendChild(createRequestCard(req));
      });
    }
  }

  function handleSearch() {
    currentSearchTerm = searchInput.value;
    if (currentSearchTerm.length > 0) {
      searchClear.style.display = 'flex';
    } else {
      searchClear.style.display = 'none';
    }
    applySortAndFilter();
  }

  function clearSearch() {
    searchInput.value = '';
    currentSearchTerm = '';
    searchClear.style.display = 'none';
    applySortAndFilter();
    searchInput.focus();
  }

  function updateAddButton() {
    addMangaBtn.style.display = 'flex';
    addMangaBtn.title = 'Richiedi un manga';
    addMangaBtn.style.background = '#8b5cf6';
    addMangaBtn.onclick = () => {
      requestModal.classList.add('active');
    };
  }

  async function switchTab(tab) {
    currentTab = tab;
    
    tabs.forEach(btn => {
      if (btn.dataset.tab === tab) {
        btn.classList.add('active');
      } else {
        btn.classList.remove('active');
      }
    });
    
    if (tab === 'external') {
      await loadExternalMangas(true);
    }
    if (tab === 'requests') {
      loadRequests();
    }
    
    searchInput.value = '';
    currentSearchTerm = '';
    searchClear.style.display = 'none';
    
    updateAddButton();
    applySortAndFilter();
  }

  async function reloadAllData() {
    showToast('🔄 Ricaricamento in corso...');
    await loadLocalMangas();
    await loadExternalMangas(true);
    loadRequests();
    if (currentTab === 'external' || currentTab === 'local') {
      applySortAndFilter();
    } else if (currentTab === 'requests') {
      renderRequestsTab();
    }
    showToast('✅ Libreria ricaricata!');
  }

  async function loadAllMangas() {
    await loadLocalMangas();
    await loadExternalMangas(true);
    loadRequests();
    updateAddButton();
    applySortAndFilter();
  }

  sortSelect.addEventListener('change', applySortAndFilter);
  searchInput.addEventListener('input', handleSearch);
  searchClear.addEventListener('click', clearSearch);
  reloadBtn.addEventListener('click', reloadAllData);
  adminBtn.addEventListener('click', authenticateAdmin);
  closeAdmin.addEventListener('click', () => adminPanel.classList.remove('active'));
  submitRequest.addEventListener('click', addRequest);
  closeModal.addEventListener('click', () => requestModal.classList.remove('active'));
  
  requestModal.addEventListener('click', (e) => {
    if (e.target === requestModal) requestModal.classList.remove('active');
  });
  
  tabs.forEach(btn => {
    btn.addEventListener('click', () => switchTab(btn.dataset.tab));
  });
  
  loadAllMangas();
</script>

</body>
</html>
