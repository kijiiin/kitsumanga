<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KitsuManga</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      color: white;
    }
    header {
      padding: 25px;
      text-align: center;
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    h1 { font-size: 2.5em; }
    .controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 1400px;
      margin: 0 auto 20px;
      padding: 0 20px;
      gap: 15px;
      flex-wrap: wrap;
    }
    .search-container {
      flex: 1;
      max-width: 400px;
      position: relative;
    }
    .search-input {
      width: 100%;
      padding: 10px 15px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(139, 92, 246, 0.5);
      border-radius: 25px;
      color: white;
      font-size: 0.9rem;
      transition: all 0.3s;
      outline: none;
    }
    .search-input:focus {
      border-color: #8b5cf6;
      background: rgba(255,255,255,0.15);
      box-shadow: 0 0 10px rgba(139, 92, 246, 0.3);
    }
    .search-input::placeholder {
      color: rgba(255,255,255,0.6);
    }
    .search-clear {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      transition: 0.2s;
    }
    .search-clear:hover {
      background: rgba(255,255,255,0.4);
    }
    .sort-select {
      background: rgba(255,255,255,0.1);
      color: white;
      border: 1px solid rgba(139, 92, 246, 0.5);
      padding: 8px 15px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.9rem;
    }
    .sort-select:hover {
      background: rgba(139, 92, 246, 0.3);
    }
    .results-info {
      font-size: 0.85rem;
      color: #c4b5fd;
      padding: 0 20px;
      margin-bottom: 15px;
      text-align: center;
    }
    .tabs {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 30px;
      padding: 0 20px;
    }
    .tab-btn {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(139, 92, 246, 0.3);
      padding: 10px 25px;
      border-radius: 25px;
      cursor: pointer;
      color: white;
      font-size: 1rem;
      transition: 0.3s;
    }
    .tab-btn.active {
      background: #8b5cf6;
      border-color: #8b5cf6;
      box-shadow: 0 0 15px rgba(139, 92, 246, 0.5);
    }
    .tab-btn:hover:not(.active) {
      background: rgba(139, 92, 246, 0.3);
    }
    .container { padding: 0 20px 30px; max-width: 1400px; margin: 0 auto; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 25px;
    }
    .card {
      background: rgba(255,255,255,0.1);
      border-radius: 15px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.3s;
      border: 1px solid rgba(255,255,255,0.1);
      position: relative;
    }
    .card:hover {
      transform: translateY(-8px);
      box-shadow: 0 15px 30px rgba(0,0,0,0.5);
      border-color: #8b5cf6;
    }
    .card img {
      width: 100%;
      height: 260px;
      object-fit: cover;
      background: #1a1a2e;
    }
    .info { padding: 15px; }
    .title {
      font-weight: bold;
      margin-bottom: 5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .chapter { font-size: 13px; color: #c4b5fd; }
    .external-badge {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(139, 92, 246, 0.9);
      padding: 4px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: bold;
      backdrop-filter: blur(5px);
    }
    .no-results {
      grid-column: 1/-1;
      text-align: center;
      padding: 50px;
      color: #c4b5fd;
    }
    .add-manga {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: #8b5cf6;
      color: white;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      cursor: pointer;
      box-shadow: 0 5px 20px rgba(139, 92, 246, 0.4);
      transition: 0.3s;
      border: none;
      text-decoration: none;
      z-index: 100;
    }
    .add-manga:hover {
      transform: scale(1.1);
      background: #a78bfa;
    }
    footer {
      text-align: center;
      padding: 20px;
      background: rgba(0,0,0,0.2);
      margin-top: 40px;
    }
    
    @media (max-width: 768px) {
      h1 { font-size: 1.8em; }
      .controls { flex-direction: column; align-items: stretch; }
      .search-container { max-width: 100%; }
      .grid { gap: 15px; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
      .card img { height: 200px; }
      .tab-btn { padding: 6px 15px; font-size: 0.85rem; }
    }
  </style>
</head>
<body>

<header>
  <h1>📚 KitsuManga</h1>
  <p style="margin-top: 10px; opacity: 0.8;">La tua libreria manga personale</p>
</header>

<div class="controls">
  <div class="search-container">
    <input type="text" class="search-input" id="searchInput" placeholder="🔍 Cerca manga..." autocomplete="off">
    <button class="search-clear" id="searchClear" style="display: none;">✕</button>
  </div>
  <select class="sort-select" id="sortSelect">
    <option value="title">📝 Ordine alfabetico</option>
    <option value="title-desc">📝 Alfabetico inverso</option>
    <option value="latest">🆕 Più recenti prima</option>
    <option value="latest-desc">🕐 Meno recenti prima</option>
    <option value="default">📋 Ordine originale</option>
  </select>
</div>

<div class="tabs">
  <button class="tab-btn active" data-tab="local">📁 Manga Locali</button>
  <button class="tab-btn" data-tab="external">🌐 Manga Esterni</button>
</div>

<div class="results-info" id="resultsInfo"></div>

<div class="container">
  <div class="grid" id="grid">
    <div style="grid-column: 1/-1; text-align: center; padding: 50px; color: #c4b5fd;">
      Caricamento libreria...
    </div>
  </div>
</div>

<a href="admin.html" class="add-manga" title="Aggiungi Manga Locale">+</a>

<footer>
  © 2026 KitsuManga
</footer>

<script>
  const grid = document.getElementById('grid');
  const sortSelect = document.getElementById('sortSelect');
  const searchInput = document.getElementById('searchInput');
  const searchClear = document.getElementById('searchClear');
  const resultsInfo = document.getElementById('resultsInfo');
  const tabs = document.querySelectorAll('.tab-btn');
  
  let mangasLocal = [];
  let mangasExternal = [];
  let currentTab = 'local';
  let currentSearchTerm = '';

  // Carica manga locali da manga.json
  async function loadLocalMangas() {
    try {
      const res = await fetch("manga.json");
      const data = await res.json();
      mangasLocal = data.map(m => ({ ...m, type: 'local' }));
    } catch (e) {
      console.error('Errore nel caricamento manga locali:', e);
      mangasLocal = [];
    }
  }

  // Carica manga esterni da external.json
  async function loadExternalMangas() {
    try {
      const res = await fetch("external.json");
      if (res.ok) {
        const data = await res.json();
        mangasExternal = data.map(m => ({ ...m, type: 'external' }));
      } else {
        // Se il file non esiste, crea un array vuoto
        mangasExternal = [];
      }
    } catch (e) {
      console.log('File external.json non trovato, verrà creato automaticamente');
      mangasExternal = [];
    }
  }

  // Funzioni di ordinamento
  function sortByTitle(a, b) {
    return a.title.localeCompare(b.title);
  }
  
  function sortByTitleDesc(a, b) {
    return b.title.localeCompare(a.title);
  }
  
  function sortByLatest(a, b) {
    const getNumber = (str) => {
      const match = str?.match(/\d+/);
      return match ? parseInt(match[0]) : 0;
    };
    return getNumber(b.latest) - getNumber(a.latest);
  }
  
  function sortByLatestDesc(a, b) {
    const getNumber = (str) => {
      const match = str?.match(/\d+/);
      return match ? parseInt(match[0]) : 0;
    };
    return getNumber(a.latest) - getNumber(b.latest);
  }

  // Filtra i manga in base al termine di ricerca
  function filterMangas(mangas, searchTerm) {
    if (!searchTerm.trim()) return mangas;
    
    const term = searchTerm.toLowerCase().trim();
    return mangas.filter(m => 
      m.title.toLowerCase().includes(term) ||
      (m.latest && m.latest.toLowerCase().includes(term)) ||
      (m.author && m.author.toLowerCase().includes(term))
    );
  }

  function renderMangas(mangas) {
    if (mangas.length === 0) {
      if (currentTab === 'local') {
        grid.innerHTML = '<div class="no-results">😕 Nessun manga locale trovato. Clicca sul pulsante + per aggiungerne uno.</div>';
      } else {
        grid.innerHTML = '<div class="no-results">🌐 Nessun manga esterno trovato. Aggiungi manga esterni modificando il file external.json</div>';
      }
      return;
    }

    grid.innerHTML = "";
    
    mangas.forEach(m => {
      const card = document.createElement("div");
      card.className = "card";
      
      const externalBadge = m.type === 'external' ? '<div class="external-badge">🌐 ESTERNO</div>' : '';
      
      card.innerHTML = `
        ${externalBadge}
        <img src="${m.cover}" alt="${m.title}" onerror="this.src='https://placehold.co/300x400/1a1a2e/a78bfa?text=${encodeURIComponent(m.title)}'">
        <div class="info">
          <div class="title">${m.title}</div>
          <div class="chapter">${m.latest || 'Nessun capitolo'}</div>
          ${m.author ? `<div class="chapter" style="font-size: 11px;">✍️ ${m.author}</div>` : ''}
        </div>
      `;
      
      card.onclick = function() {
        if (m.type === 'local') {
          window.location.href = 'manga-detail.html?manga=' + encodeURIComponent(m.id) + '&title=' + encodeURIComponent(m.title);
        } else {
          // Per i manga esterni, apri il lettore con l'URL esterno
          window.location.href = `external-reader.html?url=${encodeURIComponent(m.externalUrl)}&title=${encodeURIComponent(m.title)}`;
        }
      };
      
      grid.appendChild(card);
    });
  }

  function updateResultsInfo(filteredCount, totalCount, searchTerm) {
    const tabLabel = currentTab === 'local' ? 'manga locali' : 'manga esterni';
    if (searchTerm && searchTerm.trim()) {
      resultsInfo.innerHTML = `🔍 Trovati ${filteredCount} ${tabLabel} su ${totalCount} per "${searchTerm.trim()}"`;
    } else {
      resultsInfo.innerHTML = `📚 Totale: ${totalCount} ${tabLabel} nella libreria`;
    }
  }

  function getCurrentMangas() {
    return currentTab === 'local' ? [...mangasLocal] : [...mangasExternal];
  }

  function applySortAndFilter() {
    const sortType = sortSelect.value;
    let mangas = getCurrentMangas();
    const totalCount = mangas.length;
    
    // Applica filtro di ricerca
    let filtered = filterMangas(mangas, currentSearchTerm);
    
    // Applica ordinamento
    switch(sortType) {
      case 'title':
        filtered.sort(sortByTitle);
        break;
      case 'title-desc':
        filtered.sort(sortByTitleDesc);
        break;
      case 'latest':
        filtered.sort(sortByLatest);
        break;
      case 'latest-desc':
        filtered.sort(sortByLatestDesc);
        break;
      default:
        // Ordine originale (mantieni come nel JSON)
        break;
    }
    
    renderMangas(filtered);
    updateResultsInfo(filtered.length, totalCount, currentSearchTerm);
  }

  // Gestione ricerca in tempo reale
  function handleSearch() {
    currentSearchTerm = searchInput.value;
    
    // Mostra/nascondi pulsante clear
    if (currentSearchTerm.length > 0) {
      searchClear.style.display = 'flex';
    } else {
      searchClear.style.display = 'none';
    }
    
    // Applica filtro e ordinamento
    applySortAndFilter();
  }

  // Clear ricerca
  function clearSearch() {
    searchInput.value = '';
    currentSearchTerm = '';
    searchClear.style.display = 'none';
    applySortAndFilter();
    searchInput.focus();
  }

  // Cambia tab
  async function switchTab(tab) {
    currentTab = tab;
    
    // Aggiorna UI dei tab
    tabs.forEach(btn => {
      if (btn.dataset.tab === tab) {
        btn.classList.add('active');
      } else {
        btn.classList.remove('active');
      }
    });
    
    // Resetta la ricerca
    searchInput.value = '';
    currentSearchTerm = '';
    searchClear.style.display = 'none';
    
    // Applica filtro e ordinamento
    applySortAndFilter();
  }

  // Crea file external.json di esempio se non esiste
  async function createSampleExternalJson() {
    try {
      const res = await fetch("external.json");
      if (!res.ok) {
        // Crea un file di esempio
        const sampleExternal = [
          {
            "id": "one-piece-external",
            "title": "One Piece (Esterno)",
            "cover": "https://placehold.co/300x400/1a1a2e/a78bfa?text=One+Piece",
            "latest": "Capitolo 1100",
            "author": "Eiichiro Oda",
            "externalUrl": "https://example.com/one-piece",
            "type": "external"
          },
          {
            "id": "naruto-external",
            "title": "Naruto (Esterno)",
            "cover": "https://placehold.co/300x400/1a1a2e/a78bfa?text=Naruto",
            "latest": "Capitolo 700",
            "author": "Masashi Kishimoto",
            "externalUrl": "https://example.com/naruto",
            "type": "external"
          }
        ];
        
        // Nota: In un ambiente reale, per salvare il file servirebbe un backend
        console.log('Per aggiungere manga esterni, crea il file external.json con questa struttura:', sampleExternal);
      }
    } catch(e) {
      console.log('external.json non trovato');
    }
  }

  async function loadAllMangas() {
    await loadLocalMangas();
    await loadExternalMangas();
    await createSampleExternalJson();
    applySortAndFilter();
  }

  // Event listeners
  sortSelect.addEventListener('change', applySortAndFilter);
  searchInput.addEventListener('input', handleSearch);
  searchClear.addEventListener('click', clearSearch);
  
  tabs.forEach(btn => {
    btn.addEventListener('click', () => switchTab(btn.dataset.tab));
  });
  
  loadAllMangas();
</script>

</body>
</html>
