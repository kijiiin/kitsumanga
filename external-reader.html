<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lettore Manga Esterno</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: white;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .top-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      padding: 0.8rem 1.5rem;
      background: rgba(10, 10, 20, 0.95);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      gap: 1rem;
      z-index: 1000;
      border-bottom: 1px solid rgba(139, 92, 246, 0.3);
    }
    .back-btn {
      background: rgba(139, 92, 246, 0.3);
      color: white;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.9rem;
      text-decoration: none;
    }
    .manga-title {
      font-size: 1.1rem;
      font-weight: 600;
      flex: 1;
    }
    .iframe-container {
      flex: 1;
      margin-top: 60px;
      height: calc(100vh - 60px);
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: white;
    }
    .loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: #c4b5fd;
    }
  </style>
</head>
<body>

<div class="top-bar">
  <a href="javascript:history.back()" class="back-btn">← Libreria</a>
  <span class="manga-title" id="mangaTitle">Caricamento...</span>
</div>

<div class="iframe-container">
  <div class="loading" id="loading">🌐 Caricamento manga esterno...</div>
  <iframe id="externalFrame" style="display: none;"></iframe>
</div>

<script>
  const urlParams = new URLSearchParams(window.location.search);
  const externalUrl = decodeURIComponent(urlParams.get('url') || '');
  const mangaTitle = decodeURIComponent(urlParams.get('title') || 'Manga Esterno');
  
  document.getElementById('mangaTitle').textContent = mangaTitle;
  document.title = `${mangaTitle} - KitsuManga`;
  
  const iframe = document.getElementById('externalFrame');
  const loading = document.getElementById('loading');
  
  if (externalUrl) {
    iframe.src = externalUrl;
    iframe.onload = () => {
      loading.style.display = 'none';
      iframe.style.display = 'block';
    };
    iframe.onerror = () => {
      loading.innerHTML = '❌ Errore nel caricamento del manga esterno';
      loading.style.color = '#ef4444';
    };
  } else {
    loading.innerHTML = '❌ Nessun URL specificato';
    loading.style.color = '#ef4444';
  }
</script>

</body>
</html>
